model:
  provider: ollama
  name: llama3.1:latest
  base_url: http://localhost:11434/v1
  api_key: null

embedding:
  provider: local
  model: all-MiniLM-L6-v2
  device: cpu

chroma:
  persist_dir: ./storage/chromadb

security:
  rate_limit: 30
  max_query_length: 500
  audit_db: ./storage/audit.db

graph:
  backend: networkx           # "networkx" for local, "neo4j" for production
  json_path: ./graphrag_output/knowledge_graph.json
  neo4j_uri: bolt://localhost:7687
  neo4j_user: neo4j
  neo4j_password: password
  neo4j_database: neo4j

directories:
  pdf_dir: /tmp/normativa_pdfs
